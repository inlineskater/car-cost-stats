<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CarCosts" />
    <link rel="icon" type="image/x-icon" href="/car-cost-stats/favicon.ico" />
    <link rel="apple-touch-icon" href="/car-cost-stats/pwa-icon-512.png" />
    <link rel="manifest" href="/car-cost-stats/manifest.webmanifest" />
    <title>Car Cost Tracker</title>
    <!-- SPA redirect from 404.html -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          var url = new URL(redirect);
          var path = url.pathname.replace('/car-cost-stats', '') || '/';
          history.replaceState(null, null, '/car-cost-stats' + path + url.search + url.hash);
        }
      })();
    </script>
  </head>
  <body class="bg-slate-900 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
